{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white py-3 text-center">
                <h3 class="fw-bold mb-0">New Blood Request</h3>
                <p class="text-muted mb-0">Submit emergency requests for hospitals.</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('request_blood') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hospital Name</label>
                        <input type="text" name="hospital" class="form-control" placeholder="e.g. Kongu Medical Center" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Blood Group Required</label>
                            <select name="blood_group" class="form-select" required>
                                <option value="" disabled selected>Select Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Quantity (ml)</label>
                            <input type="number" name="quantity" class="form-control" placeholder="e.g. 500" required min="100">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Request</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
