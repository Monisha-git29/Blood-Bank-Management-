{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white py-3 text-center">
                <h3 class="fw-bold mb-0">Register Donation</h3>
                <p class="text-muted mb-0">System automatically checks for 3-month eligibility.</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('add_donor') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Donor Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Rahul Kumar" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Blood Group</label>
                            <select name="blood_group" class="form-select" required>
                                <option value="" disabled selected>Select Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="10-digit number" required>
                        </div>
                    </div>
                    <div class="alert alert-light border small">
                        <i class="fas fa-info-circle me-2"></i> Standard donation volume: <strong>450ml</strong>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Donation</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
